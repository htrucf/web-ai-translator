worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 75s;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # Upstream pools
    upstream backend_pool {
        # docker-compose service name + internal port. The `replicas: 2` deploy
        # spec makes Docker DNS round-robin between the two backend tasks.
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend_pool {
        server frontend:80;
        keepalive 16;
    }

    # Map for WebSocket upgrade header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;   # PDF uploads can be large

        # Health passthrough
        location = /health {
            proxy_pass http://backend_pool/health;
        }

        # WebSocket endpoint for realtime job progress
        location /ws/ {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;   # long-lived
            proxy_send_timeout 3600s;
        }

        # API — round-robin between backend replicas
        location /api/ {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;     # Long enough for big PDF responses
            proxy_send_timeout 600s;
        }

        # Prometheus /metrics — gated by IP allowlist in real prod; open for DATN
        location /metrics {
            proxy_pass http://backend_pool/metrics;
        }

        # Everything else → SPA
        location / {
            proxy_pass http://frontend_pool;
            proxy_set_header Host $host;
        }
    }
}
