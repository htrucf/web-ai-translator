# Frontend Nginx — just serves the React SPA. The outer `nginx` service in
# docker-compose proxies /api/* and /ws/* to the backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }
}
